---
name: Deploy to Production

# Production deployment
# - Configuration loaded from credentials/deploy-config.env (version controlled)
# - Sensitive data from GitHub Secrets (encrypted)
# - NO hardcoded values in yml
# Triggers on: Push to main branch
# Deploys to: /home/ubuntu/csc648-fa25-03-team02

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy-production:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backup tag
        run: |
          TAG_NAME="production-$(date +%Y%m%d-%H%M%S)"
          git tag $TAG_NAME
          git push origin $TAG_NAME || true
          echo "INFO: Created backup tag $TAG_NAME"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e  # Exit on any error
            
            echo "========================================"
            echo "INFO: Starting PRODUCTION deployment"
            echo "WARNING: Deploying to LIVE environment"
            echo "========================================"
            
            # Step 1: Navigate to repo and pull latest code first
            # This ensures we get the latest deploy-config.env
            REPO_DIR="/home/ubuntu/csc648-fa25-03-team02"
            cd "$REPO_DIR" || { echo "ERROR: Cannot access $REPO_DIR"; exit 1; }
            
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git pull origin main
            LATEST_COMMIT=$(git log --oneline -1)
            echo "INFO: Latest commit: $LATEST_COMMIT"
            
            # Step 2: Load configuration from version-controlled file
            # This file contains non-sensitive configuration
            if [ ! -f "credentials/deploy-config.env" ]; then
              echo "ERROR: Configuration file not found: credentials/deploy-config.env"
              exit 1
            fi
            
            echo "INFO: Loading configuration from deploy-config.env..."
            source credentials/deploy-config.env
            
            # Step 3: Get sensitive data from GitHub Secrets
            # Database password comes from GitHub Secrets (encrypted, not in code)
            DATABASE_PASSWORD="${{ secrets.DB_PASSWORD }}"
            
            if [ -z "$DATABASE_PASSWORD" ]; then
              echo "ERROR: DB_PASSWORD secret not set in GitHub"
              echo "Please add DB_PASSWORD to repository secrets"
              exit 1
            fi
            
            # Step 4: Set environment-specific variables from loaded config
            REPO_DIR="$PROD_REPO_DIR"
            BRANCH="$PROD_BRANCH"
            DATABASE_NAME="$PROD_DATABASE_NAME"
            DATABASE_USER="$DATABASE_USER"
            DATABASE_HOST="$DATABASE_HOST"
            DATABASE_PORT="$DATABASE_PORT"
            API_PORT="$PROD_API_PORT"
            SERVICE_NAME="$PROD_SERVICE_NAME"
            DOMAIN="$PROD_DOMAIN"
            API_BASE_URL="$PROD_API_BASE_URL"
            ENVIRONMENT="$PROD_ENVIRONMENT"
            PYTHON_VERSION="$PYTHON_VERSION"
            
            echo "INFO: Configuration loaded successfully"
            echo "INFO: Deploying to: $DOMAIN"
            echo "INFO: Database: $DATABASE_NAME"
            echo "INFO: Service: $SERVICE_NAME"
            echo "INFO: Environment: $ENVIRONMENT"
            
            # Step 5: Create backup before deployment
            echo "INFO: Creating backup..."
            BACKUP_DIR="$HOME/backups"
            mkdir -p "$BACKUP_DIR"
            if [ -d "$REPO_DIR/application" ]; then
              BACKUP_FILE="$BACKUP_DIR/backup-$(date +%Y%m%d-%H%M%S).tar.gz"
              cd "$REPO_DIR"
              tar -czf "$BACKUP_FILE" application/ 2>/dev/null || true
              echo "INFO: Backup created at $BACKUP_FILE"
            fi
            
            # Backend deployment
            echo "========================================"
            echo "[1/6] Updating backend dependencies..."
            echo "========================================"
            cd "$REPO_DIR/application/backend"
            
            # Create or update virtual environment
            if [ -d "venv" ]; then
              VENV_PYTHON_VERSION=$(cat venv/pyvenv.cfg 2>/dev/null | grep "version = " | cut -d' ' -f3 || echo "unknown")
              if [[ ! "$VENV_PYTHON_VERSION" =~ ^${PYTHON_VERSION} ]]; then
                echo "INFO: Removing old venv (Python $VENV_PYTHON_VERSION)"
                rm -rf venv
              fi
            fi
            
            if [ ! -d "venv" ]; then
              echo "INFO: Creating new virtual environment..."
              python${PYTHON_VERSION} -m venv venv
            fi
            
            source venv/bin/activate
            echo "INFO: Installing Python dependencies..."
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet
            echo "INFO: Backend dependencies installed"
            
            # Configure backend
            echo "========================================"
            echo "[2/6] Configuring backend..."
            echo "========================================"
            cat > .env << EOF
            DATABASE_URL=mysql+pymysql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
            ENVIRONMENT=${ENVIRONMENT}
            EOF
            echo "INFO: Backend .env file created"
            
            # Update subjects in database
            echo "========================================"
            echo "[2.5/6] Updating subjects in database..."
            echo "========================================"
            if [ -f "scripts/update_subjects.py" ]; then
              echo "INFO: Running subject update script..."
              python scripts/update_subjects.py || {
                echo "WARNING: Subject update script failed, but continuing deployment..."
                echo "WARNING: You may need to run 'python scripts/update_subjects.py' manually"
              }
            else
              echo "WARNING: update_subjects.py not found, skipping subject update"
            fi
            
            # Update courses in database
            echo "========================================"
            echo "[2.6/6] Updating courses in database..."
            echo "========================================"
            if [ -f "scripts/update_courses.py" ]; then
              echo "INFO: Running course update script..."
              python scripts/update_courses.py || {
                echo "WARNING: Course update script failed, but continuing deployment..."
                echo "WARNING: You may need to run 'python scripts/update_courses.py' manually"
              }
            else
              echo "WARNING: update_courses.py not found, skipping course update"
            fi
            
            # Run database migrations
            echo "========================================"
            echo "[2.7/6] Running database migrations..."
            echo "========================================"
            if [ -f "run_migrations.py" ]; then
              echo "INFO: Running database migrations..."
              python run_migrations.py || {
                echo "ERROR: Migration script failed"
                echo "ERROR: Deployment stopped - please fix migrations before deploying"
                exit 1
              }
              echo "INFO: Database migrations completed"
            else
              echo "WARNING: run_migrations.py not found, skipping migrations"
              echo "WARNING: You may need to run migrations manually"
            fi
            
            # Fix profile_photo_url column if needed (emergency fix)
            echo "========================================"
            echo "[2.8/6] Verifying profile_photo_url column..."
            echo "========================================"
            if [ -f "fix_profile_photo_column.py" ]; then
              echo "INFO: Checking and fixing profile_photo_url column type..."
              python fix_profile_photo_column.py || {
                echo "WARNING: Profile photo column fix script failed, but continuing..."
                echo "WARNING: You may need to run 'python fix_profile_photo_column.py' manually"
              }
            fi
            
            # Restart backend service
            echo "========================================"
            echo "[3/6] Restarting backend service..."
            echo "========================================"
            
            # Kill any process on the port
            if sudo lsof -ti:$API_PORT >/dev/null 2>&1; then
              echo "INFO: Killing existing processes on port $API_PORT"
              sudo lsof -ti:$API_PORT | xargs sudo kill -9 2>/dev/null || true
              sleep 2
            fi
            
            # Restart systemd service
            sudo systemctl restart "$SERVICE_NAME"
            echo "INFO: Waiting for service to start..."
            sleep 5
            
            # Verify service is running
            if ! sudo systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "ERROR: Backend service failed to start"
              sudo systemctl status "$SERVICE_NAME" --no-pager | head -20
              exit 1
            fi
            echo "INFO: Backend service is running"
            
            # Frontend deployment
            echo "========================================"
            echo "[4/6] Building frontend..."
            echo "========================================"
            cd "$REPO_DIR/application/client"
            
            # Clean old build
            rm -rf dist/
            
            # Create frontend .env file
            echo "INFO: Creating frontend .env file..."
            echo "VITE_API_BASE_URL=$API_BASE_URL" > .env
            echo "VITE_ENV=$ENVIRONMENT" >> .env
            cat .env
            
            # Install dependencies and build
            echo "INFO: Installing npm dependencies..."
            npm ci --quiet
            
            echo "INFO: Building frontend..."
            npm run build
            
            # Verify build
            if [ ! -d "dist" ]; then
              echo "ERROR: dist folder was not created after build"
              exit 1
            fi
            
            # Verify API URL is in build
            if ! grep -o "const [a-zA-Z0-9]*=\"$API_BASE_URL\"" dist/assets/*.js >/dev/null 2>&1; then
              echo "WARNING: Build verification failed - API URL not found in build"
            else
              echo "INFO: Build verification passed"
            fi
            
            # Set permissions
            sudo chown -R ubuntu:ubuntu dist/
            sudo chmod -R 755 dist/
            echo "INFO: Frontend built successfully"
            
            # Update Nginx configuration for large file uploads
            echo "========================================"
            echo "[5/6] Updating Nginx configuration..."
            echo "========================================"
            # Try to find the Nginx config file
            NGINX_CONFIG=""
            POSSIBLE_CONFIGS=(
              "/etc/nginx/sites-available/sfsututor.site"
              "/etc/nginx/sites-available/default"
              "/etc/nginx/conf.d/sfsututor.site.conf"
              "/etc/nginx/nginx.conf"
            )
            
            for config in "${POSSIBLE_CONFIGS[@]}"; do
              if [ -f "$config" ] && grep -q "sfsututor.site\|server_name.*sfsututor" "$config" 2>/dev/null; then
                NGINX_CONFIG="$config"
                echo "INFO: Found Nginx config at $NGINX_CONFIG"
                break
              fi
            done
            
            # If still not found, try to find any config with the domain or API proxy
            if [ -z "$NGINX_CONFIG" ]; then
              for config in "${POSSIBLE_CONFIGS[@]}"; do
                if [ -f "$config" ] && grep -q "proxy_pass.*127.0.0.1:8000\|location /api" "$config" 2>/dev/null; then
                  NGINX_CONFIG="$config"
                  echo "INFO: Found Nginx config with API proxy at $NGINX_CONFIG"
                  break
                fi
              done
            fi
            
            if [ -n "$NGINX_CONFIG" ]; then
              # Check if client_max_body_size is already set in the server block
              if ! grep -A 20 "server {" "$NGINX_CONFIG" | grep -q "client_max_body_size"; then
                echo "INFO: Adding client_max_body_size to Nginx config..."
                # Add it in the server block (after server_name or after listen)
                if grep -q "server_name" "$NGINX_CONFIG"; then
                  sudo sed -i '/server_name/a\    client_max_body_size 10M;' "$NGINX_CONFIG"
                elif grep -q "listen.*80" "$NGINX_CONFIG"; then
                  sudo sed -i '/listen.*80/a\    client_max_body_size 10M;' "$NGINX_CONFIG"
                else
                  # Add after first server { line
                  sudo sed -i '/^[[:space:]]*server[[:space:]]*{/a\    client_max_body_size 10M;' "$NGINX_CONFIG"
                fi
                echo "INFO: Added client_max_body_size to server block"
              fi
              
              # Also add it in the /api location block if it exists
              if grep -q "location /api" "$NGINX_CONFIG"; then
                if ! grep -A 5 "location /api" "$NGINX_CONFIG" | grep -q "client_max_body_size"; then
                  sudo sed -i '/location \/api {/a\        client_max_body_size 10M;' "$NGINX_CONFIG"
                  echo "INFO: Added client_max_body_size to /api location block"
                fi
              fi
              
              echo "INFO: Nginx config updated with client_max_body_size 10M"
            else
              echo "WARNING: Could not find Nginx config file"
              echo "WARNING: Please manually add 'client_max_body_size 10M;' to your Nginx server block"
              echo "WARNING: You can find your config with: sudo nginx -T | grep -A 5 'server {'"
            fi
            
            # Test and reload Nginx
            echo "INFO: Testing Nginx configuration..."
            sudo nginx -t
            if [ $? -eq 0 ]; then
              echo "INFO: Nginx configuration test passed"
              sudo systemctl reload nginx
              echo "INFO: Nginx reloaded"
            else
              echo "ERROR: Nginx configuration test failed"
              echo "ERROR: Nginx not reloaded - please fix configuration manually"
            fi
            
            # Health checks
            echo "========================================"
            echo "[6/6] Running health checks..."
            echo "========================================"
            sleep 3
            
            BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API_BASE_URL/api/v1/health" || echo "000")
            FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API_BASE_URL/" || echo "000")
            SEARCH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API_BASE_URL/search" || echo "000")
            TUTOR_COUNT=$(curl -s "$API_BASE_URL/api/search" | \
              grep -o '"count":[0-9]*' | cut -d':' -f2 || echo "")
            
            echo "========================================"
            echo "Deployment complete: https://$DOMAIN"
            echo "========================================"
            echo "Commit: $LATEST_COMMIT"
            echo "Backend service: $(sudo systemctl is-active $SERVICE_NAME)"
            echo "Backend health: $BACKEND_HEALTH"
            echo "Frontend: $FRONTEND_STATUS"
            echo "Search page: $SEARCH_STATUS"
            [ ! -z "$TUTOR_COUNT" ] && echo "Database: OK ($TUTOR_COUNT tutors)"
            echo "========================================"

      - name: Health Check
        run: |
          echo "INFO: Verifying production deployment..."
          sleep 15

          MAX_ATTEMPTS=5
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "INFO: Attempt $ATTEMPT of $MAX_ATTEMPTS"

            # Check backend health
            URL="https://sfsututor.site/api/v1/health"
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              "$URL" || echo "000")

            if [ "$response" = "200" ]; then
              echo "SUCCESS: Backend is healthy"

              # Check frontend
              URL2="https://sfsututor.site"
              frontend=$(curl -s -o /dev/null -w "%{http_code}" \
                "$URL2" || echo "000")

              if [ "$frontend" = "200" ]; then
                echo "SUCCESS: Frontend is accessible"
                echo "SUCCESS: Production deployment verified"
                exit 0
              fi
            fi

            echo "WARNING: Health check failed, retrying in 10s..."
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "ERROR: Health check failed after $MAX_ATTEMPTS"
          echo "ERROR: Automatic rollback will be triggered"
          exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          command_timeout: 15m
          script: |
            echo "WARNING: ROLLING BACK PRODUCTION"

            cd /home/ubuntu/csc648-fa25-03-team02

            # Find and restore latest backup
            BACKUP_DIR="$HOME/backups"
            BACKUP=$(ls -t "$BACKUP_DIR"/backup-*.tar.gz | head -1)

            if [ -n "$BACKUP" ]; then
              echo "INFO: Restoring from $BACKUP"
              tar -xzf "$BACKUP"
              sudo systemctl restart tutorconnect-api
              sudo systemctl reload nginx
              echo "INFO: Application rolled back"
            fi

            echo "INFO: Rollback complete"

      - name: Deployment Summary
        if: always()
        run: |
          echo "=========================================="
          echo "INFO: Deployment Summary"
          echo "=========================================="
          echo "INFO: Check the workflow status above for deployment result"
          echo "INFO: If successful, site is live at https://sfsututor.site"

