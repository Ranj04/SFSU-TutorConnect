name: CI

# Continuous Integration Pipeline
# Runs on: Pull requests to development/main, and pushes to development
# Purpose: Ensure code quality before merging

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - development

# Cancel previous runs if new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== Backend CI =====
  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: application/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black

      # Blocking: fail the build on real Python errors (syntax errors, undefined
      # names, etc.). High-signal, low-false-positive.
      - name: Lint with flake8 (errors only, blocking)
        run: |
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      # Non-blocking: style/complexity warnings surface in logs without failing CI.
      - name: Lint with flake8 (style, non-blocking)
        run: |
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Blocking: byte-compile every module to catch syntax errors. compileall
      # recurses properly (the old `app/**/*.py` glob did not, so it silently
      # checked nothing).
      - name: Compile all modules (blocking)
        run: |
          python -m compileall -q app

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    # TODO: Uncomment when linting is enabled
    # needs: backend-lint
    defaults:
      run:
        working-directory: application/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: application/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          # Check if tests directory exists
          if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
            echo "Running tests..."
            pytest --cov=app --cov-report=xml --cov-report=term-missing -v
          else
            echo "No tests found, skipping..."
            exit 0
          fi

      # TODO: Uncomment when you have tests with coverage
      # - name: Upload coverage to Codecov
      #   if: success()
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./application/backend/coverage.xml
      #     flags: backend
      #     name: backend-coverage

  # ===== Frontend CI =====
  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application/client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ESLint is now clean, so enforce it as a hard gate on the frontend.
      - name: Lint with ESLint
        run: npm run lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    # TODO: Uncomment when linting is enabled
    # needs: frontend-lint
    defaults:
      run:
        working-directory: application/client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with Vitest
        run: |
          # Check if tests exist
          if [ -d "src" ] && find src -name "*.test.*" -o -name "*.spec.*" | grep -q .; then
            echo "Running tests..."
            npm test
          else
            echo "No tests found, skipping..."
            exit 0
          fi

      # TODO: Uncomment when you have tests with coverage
      # - name: Upload coverage
      #   if: success()
      #   uses: codecov/codecov-action@v3
      #   with:
      #     directory: ./application/client/coverage
      #     flags: frontend
      #     name: frontend-coverage

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: application/client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "Build failed - dist directory is empty"
            exit 1
          fi
          echo "Build successful - dist directory contains files"

  # ===== Summary Job =====
  ci-success:
    name: CI Pipeline Complete
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.backend-test.result }}" != "success" ] || [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "CI pipeline failed"
            exit 1
          fi
          echo "All CI checks passed!"